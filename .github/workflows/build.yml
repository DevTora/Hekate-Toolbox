name: Build Hekate Toolbox

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container: devkitpro/devkita64:latest

    steps:
    - name: Checkout
      uses: actions/checkout@v7
      with:
        submodules: 'recursive'

    - name: Build
      run: make -j$(nproc)

    - name: Upload artifact
      uses: actions/upload-artifact@v7
      with:
        name: HekateToolbox
        path: out/HekateToolbox.nro
